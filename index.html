<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>منيو الباهر</title><style>body{font-family:Arial,sans-serif;background:#f0f2f5;margin:0;padding:10px;text-align:center}.container{max-width:480px;background:#fff;margin:auto;padding:15px;border-radius:20px;box-shadow:0 5px 20px rgba(0,0,0,.1)}.logo-img{width:110px;height:110px;border-radius:50%;border:3px solid #d32f2f;margin-bottom:5px;object-fit:cover}h1{color:#d32f2f;margin:5px 0}.status{padding:10px;border-radius:10px;margin-bottom:15px;font-weight:bold;color:#fff;font-size:14px}.open{background:#28a745}.closed{background:#d32f2f}.offer{background:linear-gradient(45deg,#ffd700,#ff8c00);color:#fff;padding:15px;border-radius:15px;margin-bottom:15px;font-weight:bold;font-size:15px}.sec-head{background:#2c3e50;color:#fff;padding:15px;margin-top:10px;border-radius:10px;cursor:pointer;display:flex;justify-content:space-between;font-weight:bold;font-size:18px}.list{display:none;padding:5px;border:1px solid #ddd;border-top:none;border-radius:0 0 10px 10px;margin-bottom:10px}.item{display:flex;justify-content:space-between;align-items:center;padding:15px 10px;border-bottom:1px solid #eee}.ctrl{display:flex;align-items:center;gap:10px}.btn-q{background:#e67e22;color:#fff;border:none;width:35px;height:35px;border-radius:8px;font-weight:bold;font-size:20px;cursor:pointer}.q-num{font-weight:bold;font-size:18px;min-width:20px}.cart{background:#fff3cd;border:2px dashed #ffc107;border-radius:15px;padding:15px;margin-top:25px;text-align:right}.c-item{display:flex;justify-content:space-between;background:#fff;padding:10px;margin-bottom:8px;border-radius:8px}.btn-d{background:#ff4d4d;color:#fff;border:none;padding:5px 10px;border-radius:5px}input,textarea,select{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ccc;box-sizing:border-box;font-size:16px}.btn-ord{background:#25d366;color:#fff;width:100%;padding:18px;font-size:20px;font-weight:bold;border:none;border-radius:15px;margin-top:20px;cursor:pointer}.hint{font-size:13px;color:#777;margin-top:5px;text-align:right}.pts-hint{font-size:14px;color:#e67e22;font-weight:bold;margin-top:10px}#loader{padding:20px;color:#888}</style></head><body><div class="container"><img src="https://cdn-icons-png.flaticon.com/512/3170/3170733.png" class="logo-img"><h1>🔥 مطعم الباهر 🔥</h1><div id="status-bar"></div><div class="offer">🎁 عرض الباهر: اجمع 10 نقاط واحصل على وجبة مجانية!</div><div id="dynamic-menu"><div id="loader">⏳ جاري تحميل المنيو...</div></div><div class="cart"><strong>🛒 سلة طلباتك:</strong><div id="c-disp" style="margin-top:10px"></div><hr><div style="font-size:16px;color:#555">قيمة الطلب: <span id="sub-t">0</span> د.ع</div><div style="font-size:16px;color:#555;margin-top:5px">التوصيل: <span id="del-t">1,000</span> د.ع</div><div style="font-size:20px;font-weight:bold;color:#d32f2f;margin-top:8px">الإجمالي الكلي: <span id="tot">0</span> د.ع</div><div class="pts-hint" id="pts-show">سيتم احتساب نقاطك بعد الإضافة!</div></div><input type="text" id="un" placeholder="👤 اسمك الكريم"><input type="tel" id="up" placeholder="📱 رقم الهاتف"><select id="del-area" onchange="calc()"><option value="1000">🛵 توصيل داخل النصر (1,000 د.ع)</option><option value="3000">🚗 توصيل القرى والأرياف (3,000 د.ع)</option></select><textarea id="ua" rows="2" placeholder="🏠 المنطقة، الشارع (أو اكتب: سأرسل الموقع)"></textarea><div class="hint">💡 اكتب "سأرسل الموقع" وقم بمشاركته على الواتساب.</div><textarea id="unotes" rows="2" placeholder="📝 ملاحظات الطلب"></textarea><button class="btn-ord" onclick="send()">إرسال الطلب عبر واتساب ✅</button></div><script>
const DB_URL = "https://albaher-1ec78-default-rtdb.firebaseio.com/items.json";
let hr=new Date().getHours(),sb=document.getElementById('status-bar');if(hr>=2&&hr<6){sb.className="status closed";sb.innerText="🌙 المطعم مغلق الآن.";}else{sb.className="status open";sb.innerText="✅ المطعم مفتوح";}let c={},sub=0,pts=0;function t(id){let e=document.getElementById(id);e.style.display=(e.style.display==='block')?'none':'block';}function u(n,p,ch,id){if(!c[n])c[n]={q:0,p:p,i:id};c[n].q+=ch;if(c[n].q<=0){delete c[n];document.getElementById(id).innerText="0";}else{document.getElementById(id).innerText=c[n].q;}rc();}function dItem(n){let id=c[n].i;delete c[n];if(document.getElementById(id))document.getElementById(id).innerText="0";rc();}function rc(){const d=document.getElementById('c-disp');d.innerHTML="";sub=0;for(let n in c){let s=c[n].q*c[n].p;sub+=s;d.innerHTML+=`<div class="c-item"><span>${n} (x${c[n].q})</span><span>${s.toLocaleString()} <button class="btn-d" onclick="dItem('${n}')">حذف</button></span></div>`;}calc();}function calc(){let del=parseInt(document.getElementById('del-area').value);document.getElementById('sub-t').innerText=sub.toLocaleString();document.getElementById('del-t').innerText=del.toLocaleString();let total=sub>0?sub+del:0;document.getElementById('tot').innerText=total.toLocaleString();pts=Math.floor(sub/10000);document.getElementById('pts-show').innerText=sub>0?`🌟 ستربح (${pts}) نقطة!`:""; }function send(){const n=document.getElementById('un').value,p=document.getElementById('up').value,a=document.getElementById('ua').value,notes=document.getElementById('unotes').value||'لا توجد',dSel=document.getElementById('del-area'),dTxt=dSel.options[dSel.selectedIndex].text;let v=document.getElementById('tot').innerText;if(!n||!p||!a||sub===0){alert("الرجاء ملء البيانات!");return;}let o="";for(let k in c){o+=`• ${k} (العدد: ${c[k].q})%0A`;}let m=`*طلب جديد - الباهر*%0A👤 الاسم: ${n}%0A📱 الهاتف: ${p}%0A🏠 العنوان: ${a}%0A🚚 ${dTxt}%0A📝 ملاحظات: ${notes}%0A------------------%0A🍴 الطلبات:%0A${o}------------------%0A💰 الكلي: ${v} د.ع%0A🎁 النقاط: ${pts}`;window.open(`https://wa.me/9647830834849?text=${m}`,'_blank');}
async function load(){try{const res=await fetch(DB_URL);const data=await res.json();let m={};for(let id in data){let item=data[id];if(!m[item.cat])m[item.cat]=[];m[item.cat].push({...item,id});}let h='',ci=0;for(let cat in m){ci++;h+=`<div class="sec-head" onclick="t('sc${ci}')">${cat} <span>▼</span></div><div id="sc${ci}" class="list" style="display:${ci===1?'block':'none'}">`;m[cat].forEach((x,ii)=>{let qId=`q_${ci}_${ii}`;h+=`<div class="item"><div><strong>${x.name}</strong><br><small>${x.price.toLocaleString()} د.ع</small></div><div class="ctrl"><button class="btn-q" onclick="u('${x.name}',${x.price},1,'${qId}')">+</button><span class="q-num" id="${qId}">0</span><button class="btn-q" onclick="u('${x.name}',${x.price},-1,'${qId}')">-</button></div></div>`;});h+=`</div>`;}document.getElementById('dynamic-menu').innerHTML=h||'<div style="padding:20px">❌ المنيو فارغ حالياً!</div>';}catch(e){document.getElementById('dynamic-menu').innerHTML='❌ خطأ في التحميل';}}load();
</script></body></html>
