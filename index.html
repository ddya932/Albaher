<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title id="st">مطعم الباهر - النسخة الأسطورية</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<style>
:root{--p:#d32f2f;--s:#2c3e50;--a:#e67e22;--bg:#f8f9fa;--txt:#333}
@media (prefers-color-scheme: dark) { :root{--bg:#1a1a1a;--txt:#f8f9fa} .container{background:#2d2d2d !important;color:#fff} .child-btn{background:#3d3d3d !important;color:#fff !important} .item{border-bottom:1px solid #444 !important} }
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--txt);margin:0;padding:10px 10px 120px 10px;text-align:center;direction:rtl;transition:0.3s}
.container{max-width:500px;background:#fff;margin:auto;padding:20px;border-radius:35px;box-shadow:0 10px 40px rgba(0,0,0,0.1)}
#logo{width:120px;height:120px;border-radius:50%;border:4px solid var(--p);object-fit:cover;margin-bottom:15px;animation:float 3s infinite}
@keyframes float{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.offer-bar{background:var(--p);color:#fff;padding:8px;border-radius:10px;margin-bottom:15px;font-weight:bold;overflow:hidden;white-space:nowrap}
.offer-text{display:inline-block;animation:scroll 10s linear infinite}
@keyframes scroll{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.parent-btn{background:var(--s);color:#fff;padding:18px;margin-top:15px;border-radius:18px;cursor:pointer;font-weight:bold;display:flex;justify-content:space-between}
.child-btn{background:#f1f3f5;color:var(--s);padding:14px;margin:8px 10px;border-radius:15px;cursor:pointer;font-weight:bold;text-align:right;border:1px solid #dee2e6}
.item{display:flex;justify-content:space-between;align-items:center;padding:15px 10px;border-bottom:1px solid #eee}
.btn-q{background:var(--a);color:#fff;border:none;width:42px;height:42px;border-radius:12px;font-size:24px;cursor:pointer;font-weight:bold}
.cart{background:#fff3cd;padding:20px;border-radius:25px;margin-top:25px;text-align:right;border:2px dashed #ffc107;color:#333}
.fixed-nav{position:fixed;bottom:0;left:0;width:100%;background:#fff;display:flex;padding:15px;box-shadow:0 -5px 20px rgba(0,0,0,0.1);gap:12px;z-index:1000}
.nav-btn{flex:1;padding:16px;border-radius:18px;color:#fff;text-decoration:none;font-weight:bold;font-size:15px;text-align:center}
input,textarea,select{width:100%;padding:16px;margin-top:12px;border-radius:15px;border:1px solid #ccc;box-sizing:border-box;font-size:16px}
#rate-box{margin-top:10px;font-size:20px;cursor:pointer}
</style></head><body>
<div class="container">
    <div id="offer-box" class="offer-bar" style="display:none"><div class="offer-text" id="offer-val"></div></div>
    <div id="tab-box" style="background:#e7f3ff;padding:12px;border-radius:15px;display:none;margin-bottom:12px;color:#004085;font-weight:bold">📍 طاولة رقم: <span id="tab-num"></span></div>
    <img id="logo" src="https://cdn-icons-png.flaticon.com/512/3170/3170733.png">
    <h1 id="title">مطعم الباهر</h1>
    <div id="msg" class="msg-box" style="background:#28a745;color:#fff;padding:10px;border-radius:15px;margin-bottom:10px">أهلاً بكم في مطعم الباهر</div>
    <input type="text" id="search" placeholder="🔍 ابحث عن أكلة..." onkeyup="doSearch()">
    <div id="menu-area">⏳ جاري التحميل...</div>
    <div class="cart" id="main-cart">
        <strong>🛒 سلة الطلبات:</strong><div id="c-list"></div><hr>
        <b>الإجمالي: <span id="tot">0</span> د.ع</b>
        <div id="rate-box">التقييم: <span onclick="setRate('⭐')">⭐</span><span onclick="setRate('⭐⭐')">⭐</span><span onclick="setRate('⭐⭐⭐')">⭐</span><span onclick="setRate('⭐⭐⭐⭐')">⭐</span><span onclick="setRate('⭐⭐⭐⭐⭐')">⭐</span> <b id="sel-rate"></b></div>
    </div>
    <div id="order-form">
        <input type="text" id="un" placeholder="👤 اسمك الكريم"><input type="tel" id="up" placeholder="📱 رقم الهاتف">
        <select id="del-type" onchange="rc()"><option value="0">🏠 استلام من المطعم</option><option value="1000">🛵 داخل النصر (1,000)</option><option value="3000">🚗 الأطراف (3,000)</option></select>
        <textarea id="ua" placeholder="🏠 العنوان بالتفصيل"></textarea>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px">
            <button onclick="send('wa')" style="background:#25d366;padding:18px;border-radius:18px;border:none;color:#fff;font-weight:bold">💬 واتساب</button>
            <button onclick="send('call')" style="background:#007bff;padding:18px;border-radius:18px;border:none;color:#fff;font-weight:bold">📞 اتصال</button>
        </div>
    </div>
</div>
<div class="fixed-nav"><a href="tel:07830834849" class="nav-btn" style="background:#d32f2f">☎️ اطلب الآن</a><a id="nav-map" href="#" target="_blank" class="nav-btn" style="background:#007bff">📍 الموقع</a></div>
<script>
const DB="https://albaher-1ec78-default-rtdb.firebaseio.com/";
let c={},sub=0,rt='',tableNo=new URLSearchParams(window.location.search).get('t'),ref=new URLSearchParams(window.location.search).get('ref')||'مباشر';
if(tableNo){document.getElementById('tab-box').style.display='block';document.getElementById('tab-num').innerText=tableNo;document.getElementById('ua').style.display='none';document.getElementById('del-type').style.display='none';}
function setRate(s){rt=s;document.getElementById('sel-rate').innerText=s;}
function toggle(id){let e=document.getElementById(id);e.style.display=(e.style.display==='block')?'none':'block'}
function doSearch(){let v=document.getElementById('search').value.toLowerCase();document.querySelectorAll('.item').forEach(i=>{i.style.display=i.innerText.toLowerCase().includes(v)?'flex':'none'});}
function u(n,p,ch,id,dbId){
    if(!c[n])c[n]={q:0,p:p};c[n].q+=ch;
    if(c[n].q<=0){delete c[n];document.getElementById(id).innerText="0"}else{document.getElementById(id).innerText=c[n].q}
    rc(); if(ch>0 && dbId) fetch(`${DB}items/${dbId}/clicks.json`).then(r=>r.json()).then(v=>fetch(`${DB}items/${dbId}/clicks.json`,{method:'PUT',body:(v||0)+1}));
}
function rc(){const d=document.getElementById('c-list');d.innerHTML="";sub=0;for(let n in c){sub+=(c[n].q*c[n].p);d.innerHTML+=`<div>• ${n} x${c[n].q}</div>`}
let dv=tableNo?0:parseInt(document.getElementById('del-type').value);document.getElementById('tot').innerText=(sub+dv).toLocaleString();}
function send(t){
    const n=document.getElementById('un').value,p=document.getElementById('up').value,a=document.getElementById('ua').value;
    if(sub===0||!n||!p)return alert("اكمل البيانات!");
    confetti({particleCount:150,spread:70,origin:{y:0.6}});
    let o="";for(let k in c){o+=`• ${k} (x${c[k].q})%0A`}
    let m=`*طلب جديد - الباهر*%0A👤:${n}%0A📱:${p}${tableNo?`%0A📍طاولة:${tableNo}`:`%0A🏠:${a}`}%0A🍴:${o}💰:${document.getElementById('tot').innerText} د.ع%0A⭐التقييم:${rt}%0A📢المصدر:${ref}`;
    setTimeout(()=>{if(t==='wa'){window.open(`https://wa.me/9647830834849?text=${m}`,'_blank');}else{window.location.href="tel:07830834849"}},1000);
}
async function load(){
    const resS=await fetch(DB+"settings.json");const s=await resS.json();
    if(s){document.getElementById('title').innerText=s.name;if(s.offer){document.getElementById('offer-box').style.display='block';document.getElementById('offer-val').innerText=s.offer;}if(s.msg)document.getElementById('msg').innerText=s.msg;if(s.map)document.getElementById('nav-map').href=s.map;}
    const resI=await fetch(DB+"items.json");const data=await resI.json();
    let struct={};for(let id in data){let it=data[id];if(!it.stock&&it.stock!==undefined)continue;let parts=it.cat.split('-');let p=parts[0].trim(),ch=parts.length>1?parts[1].trim():'أخرى';if(!struct[p])struct[p]={};if(!struct[p][ch])struct[p][ch]=[];struct[p][ch].push({...it,id})}
    let h='',pi=0;for(let p in struct){pi++;h+=`<div class="parent-btn" onclick="toggle('p${pi}')">${p} <span>▼</span></div><div id="p${pi}" style="display:none">`;for(let ch in struct[p]){let ci=Math.random().toString(36).substring(7);h+=`<div class="child-btn" onclick="toggle('${ci}')">${ch} ⬇️</div><div id="${ci}" style="display:block">`;struct[p][ch].forEach((x,ii)=>{let qId=Math.random().toString(36).substring(7);h+=`<div class="item"><span>${x.name} ${(x.clicks>20?'🔥':'')}<br><small>${x.price.toLocaleString()} د.ع</small></span><div class="ctrl"><button class="btn-q" onclick="u('${x.name}',${x.price},1,'${qId}','${x.id}')">+</button><span id="${qId}" style="margin:0 12px;font-weight:bold">0</span><button class="btn-q" onclick="u('${x.name}',${x.price},-1,'${qId}')">-</button></div></div>`});h+=`</div>`}h+=`</div>`}
    document.getElementById('menu-area').innerHTML=h;
}load();
</script></body></html>
