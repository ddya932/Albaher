<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منيو مطعم الباهر</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #eee; padding: 10px; text-align: center; }
        .card { background: white; padding: 15px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: red; }
        .section { background: #333; color: white; padding: 10px; margin-top: 15px; border-radius: 5px; font-weight: bold; }
        .item { border-bottom: 1px solid #ddd; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        button.add { background: green; color: white; border: none; padding: 8px; border-radius: 5px; }
        .cart { background: #fff3cd; padding: 10px; margin-top: 20px; border-radius: 10px; border: 2px solid #ffc107; }
        .cart-item { background: white; margin-bottom: 5px; padding: 5px; display: flex; justify-content: space-between; align-items: center; border-radius: 5px; }
        button.del { background: red; color: white; border: none; padding: 5px; border-radius: 3px; font-size: 12px; }
        input, textarea { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .order-btn { background: #25d366; color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🔥 مطعم الباهر 🔥</h1>

    <div class="section">🍴 المشويات</div>
    <div class="item">
        <span>كباب دجاج (15,000)</span>
        <button class="add" onclick="add('كباب دجاج', 15000)">إضافة +</button>
    </div>
    <div class="item">
        <span>نصف دجاجة (7,000)</span>
        <button class="add" onclick="add('نصف دجاجة', 7000)">إضافة +</button>
    </div>

    <div class="section">🍚 الوجبات</div>
    <div class="item">
        <span>تمن وعكود (10,000)</span>
        <button class="add" onclick="add('تمن وعكود', 10000)">إضافة +</button>
    </div>

    <div class="cart">
        <strong>🛒 سلتك:</strong>
        <div id="list"></div>
        <hr>
        <strong>المجموع: <span id="total">0</span> د.ع</strong>
    </div>

    <input type="text" id="user-name" placeholder="👤 اسمك">
    <input type="tel" id="user-phone" placeholder="📱 رقمك">
    <textarea id="user-addr" placeholder="🏠 عنوانك بالتفصيل"></textarea>

    <button class="order-btn" onclick="send()">إرسال الطلب واتساب ✅</button>
</div>

<script>
    let cart = [];
    let sum = 0;
    const ref = new URLSearchParams(window.location.search).get('ref') || 'مباشر';

    function add(n, p) {
        cart.push({n, p});
        sum += p;
        render();
    }

    function remove(i) {
        sum -= cart[i].p;
        cart.splice(i, 1);
        render();
    }

    function render() {
        const d = document.getElementById('list');
        d.innerHTML = cart.map((item, i) => `
            <div class="cart-item">
                <span>${item.n}</span>
                <span>${item.p.toLocaleString()} <button class="del" onclick="remove(${i})">حذف</button></span>
            </div>
        `).join('');
        document.getElementById('total').textContent = sum.toLocaleString();
    }

    function send() {
        const name = document.getElementById('user-name').value;
        const phone = document.getElementById('user-phone').value;
        const addr = document.getElementById('user-addr').value;

        if(!name || !phone || !addr || cart.length === 0) { alert('املأ البيانات والطلبات!'); return; }

        let items = cart.map(i => `• ${i.n}`).join('%0A');
        let msg = `*طلب جديد - الباهر*%0A👤 الاسم: ${name}%0A📱 الهاتف: ${phone}%0A🏠 العنوان: ${addr}%0A🍴 الطلبات:%0A${items}%0A💰 المجموع: ${sum.toLocaleString()}%0A📢 المصدر: ${ref}`;
        
        window.open(`https://wa.me/9647823906644?text=${msg}`, '_blank');
    }
</script>

</body>
</html>
