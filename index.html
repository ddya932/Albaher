<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو مطعم الباهر - النسخة الاحترافية</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 480px; background: white; margin: auto; padding: 15px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #d32f2f; margin-bottom: 5px; }
        .section-header { background: #2c3e50; color: white; padding: 15px; margin-top: 10px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; }
        .items-list { display: block; padding: 5px; border: 1px solid #ddd; border-top: none; border-radius: 0 0 10px 10px; margin-bottom: 10px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px 10px; border-bottom: 1px solid #eee; }
        .item:last-child { border-bottom: none; }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .btn-qty { background: #e67e22; color: white; border: none; width: 35px; height: 35px; border-radius: 8px; font-weight: bold; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .qty-num { font-weight: bold; font-size: 18px; min-width: 20px; }
        .cart-box { background: #fff3cd; border: 2px dashed #ffc107; border-radius: 15px; padding: 15px; margin-top: 25px; text-align: right; }
        .cart-item { display: flex; justify-content: space-between; background: white; padding: 10px; margin-bottom: 8px; border-radius: 8px; font-size: 15px; align-items: center; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .inputs input, .inputs textarea { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; text-align: right; }
        .order-btn { background: #25d366; color: white; width: 100%; padding: 18px; font-size: 20px; font-weight: bold; border: none; border-radius: 15px; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(37,211,102,0.3); }
    </style>
</head>
<body>

<div class="container">
    <h1>🔥 مطعم الباهر 🔥</h1>
    <p>أهلاً بك! اختر وجباتك المفضلة</p>

    <div class="section-header" onclick="toggle('sec1')">🍢 قسم المشويات <span>▼</span></div>
    <div id="sec1" class="items-list">
        <div class="item">
            <div>
                <strong>كباب دجاج</strong><br>
                <small style="color: #888;">15,000 د.ع</small>
            </div>
            <div class="qty-controls">
                <button class="btn-qty" onclick="updateQty('كباب دجاج', 15000, 1)">+</button>
                <span class="qty-num" id="q-كباب دجاج">0</span>
                <button class="btn-qty" onclick="updateQty('كباب دجاج', 15000, -1)">-</button>
            </div>
        </div>
        <div class="item">
            <div>
                <strong>نصف دجاجة</strong><br>
                <small style="color: #888;">7,000 د.ع</small>
            </div>
            <div class="qty-controls">
                <button class="btn-qty" onclick="updateQty('نصف دجاجة', 7000, 1)">+</button>
                <span class="qty-num" id="q-نصف دجاجة">0</span>
                <button class="btn-qty" onclick="updateQty('نصف دجاجة', 7000, -1)">-</button>
            </div>
        </div>
    </div>

    <div class="section-header" onclick="toggle('sec2')">🍚 الرز والوجبات <span>▼</span></div>
    <div id="sec2" class="items-list">
        <div class="item">
            <div>
                <strong>تمن وعكود</strong><br>
                <small style="color: #888;">10,000 د.ع</small>
            </div>
            <div class="qty-controls">
                <button class="btn-qty" onclick="updateQty('تمن وعكود', 10000, 1)">+</button>
                <span class="qty-num" id="q-تمن وعكود">0</span>
                <button class="btn-qty" onclick="updateQty('تمن وعكود', 10000, -1)">-</button>
            </div>
        </div>
    </div>

    <div class="cart-box">
        <strong>🛒 سلة طلباتك:</strong>
        <div id="cart-display" style="margin-top:10px;"></div>
        <hr>
        <div style="font-size: 20px; font-weight: bold; color: #d32f2f;">الإجمالي: <span id="total-val">0</span> د.ع</div>
    </div>

    <div class="inputs">
        <input type="text" id="user-name" placeholder="👤 اكتب اسمك هنا">
        <input type="tel" id="user-phone" placeholder="📱 رقم هاتفك">
        <textarea id="user-address" rows="2" placeholder="🏠 العنوان بالتفصيل (منطقة، شارع، نقطة دالة)"></textarea>
    </div>

    <button class="order-btn" onclick="sendToWhatsApp()">إرسال الطلب عبر واتساب ✅</button>
</div>

<script>
    let cart = {};
    const ref = new URLSearchParams(window.location.search).get('ref') || 'مباشر';

    function toggle(id) {
        let el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function updateQty(name, price, change) {
        if (!cart[name]) cart[name] = { qty: 0, price: price };
        cart[name].qty += change;
        if (cart[name].qty <= 0) {
            delete cart[name];
            document.getElementById('q-' + name).innerText = "0";
        } else {
            document.getElementById('q-' + name).innerText = cart[name].qty;
        }
        renderCart();
    }

    function deleteItem(name) {
        delete cart[name];
        if(document.getElementById('q-' + name)) document.getElementById('q-' + name).innerText = "0";
        renderCart();
    }

    function renderCart() {
        const display = document.getElementById('cart-display');
        display.innerHTML = "";
        let total = 0;
        for (let name in cart) {
            let subtotal = cart[name].qty * cart[name].price;
            total += subtotal;
            display.innerHTML += `
                <div class="cart-item">
                    <span>${name} (x${cart[name].qty})</span>
                    <span>${subtotal.toLocaleString()} <button class="btn-del" onclick="deleteItem('${name}')">حذف</button></span>
                </div>`;
        }
        document.getElementById('total-val').innerText = total.toLocaleString();
    }

    function sendToWhatsApp() {
        const name = document.getElementById('user-name').value;
        const phone = document.getElementById('user-phone').value;
        const addr = document.getElementById('user-address').value;
        let totalVal = document.getElementById('total-val').innerText;

        if (!name || !phone || !addr || totalVal === "0") {
            alert("الرجاء ملء البيانات واختيار الوجبات!");
            return;
        }

        let orders = "";
        for (let key in cart) { orders += `• ${key} (العدد: ${cart[key].qty})%0A`; }

        let msg = `*طلب جديد - مطعم الباهر*%0A👤 الاسم: ${name}%0A📱 الهاتف: ${phone}%0A🏠 العنوان: ${addr}%0A------------------%0A🍴 الطلبات:%0A${orders}------------------%0A💰 الإجمالي: ${totalVal} د.ع%0A📢 المصدر: ${ref}`;
        
        window.open(`https://wa.me/9647823906644?text=${msg}`, '_blank');
    }
</script>

</body>
</html>
