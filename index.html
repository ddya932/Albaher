<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title id="site-title">مطعم الباهر</title><style>
body{font-family:Arial;background:#f0f2f5;margin:0;padding:10px;text-align:center}
.container{max-width:480px;background:#fff;margin:auto;padding:15px;border-radius:20px;box-shadow:0 5px 20px rgba(0,0,0,.1)}
#main-logo{width:100px;height:100px;border-radius:50%;border:3px solid #d32f2f;object-fit:cover}
.status{padding:10px;border-radius:10px;margin:10px 0;font-weight:bold;color:#fff;background:#28a745;font-size:14px}
.special-offer{background:linear-gradient(45deg,#ffd700,#ff8c00);color:#fff;padding:15px;border-radius:15px;margin:10px 0;font-weight:bold}
/* تصميم القوائم المتداخلة */
.parent-cat{background:#2c3e50;color:#fff;padding:15px;margin-top:10px;border-radius:10px;cursor:pointer;font-weight:bold;font-size:18px}
.child-cat{background:#ecf0f1;color:#2c3e50;padding:12px;margin:5px 15px;border-radius:8px;cursor:pointer;font-weight:bold;border:1px solid #ddd;display:none}
.items-list{display:none;margin:0 20px;border-right:3px solid #d32f2f;padding-right:10px}
.item{display:flex;justify-content:space-between;align-items:center;padding:12px 5px;border-bottom:1px solid #eee}
.btn-q{background:#e67e22;color:#fff;border:none;width:30px;height:30px;border-radius:5px;cursor:pointer}
.cart{background:#fff3cd;padding:15px;border-radius:15px;margin-top:20px;text-align:right}
input,textarea,select{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ccc;box-sizing:border-box}
.btn-ord{background:#25d366;color:#fff;width:100%;padding:18px;font-size:18px;font-weight:bold;border:none;border-radius:15px;margin-top:20px}
</style></head><body><div class="container">
<img id="main-logo" src="https://cdn-icons-png.flaticon.com/512/3170/3170733.png">
<h1 id="main-name">مطعم الباهر</h1><div id="status-bar" class="status">أهلاً بكم</div>
<div id="offers-area"></div><div id="dynamic-menu">⏳ تحميل المنيو...</div>
<div class="cart"><strong>🛒 السلة:</strong><div id="c-disp"></div><hr><div>الكلي: <span id="tot" style="font-weight:bold;color:#d32f2f">0</span> د.ع</div></div>
<input type="text" id="un" placeholder="👤 الاسم"><input type="tel" id="up" placeholder="📱 الهاتف"><textarea id="ua" placeholder="🏠 العنوان"></textarea><button class="btn-ord" onclick="send()">إرسال الطلب ✅</button></div>
<script>
const DB = "https://albaher-1ec78-default-rtdb.firebaseio.com/";
let c={},sub=0;
function toggle(id){let e=document.getElementById(id);e.style.display=(e.style.display==='block')?'none':'block'}
function u(n,p,ch,id){if(!c[n])c[n]={q:0,p:p};c[n].q+=ch;if(c[n].q<=0){delete c[n];document.getElementById(id).innerText="0"}else{document.getElementById(id).innerText=c[n].q}rc();}
function rc(){const d=document.getElementById('c-disp');d.innerHTML="";sub=0;for(let n in c){let s=c[n].q*c[n].p;sub+=s;d.innerHTML+=`<div>${n} x${c[n].q}</div>`}document.getElementById('tot').innerText=sub.toLocaleString();}
function send(){/* نفس كود الإرسال السابق */}
async function load(){
    const resS=await fetch(DB+"settings.json"); const sett=await resS.json();
    if(sett){document.getElementById('main-name').innerText=sett.name; document.getElementById('main-logo').src=sett.logo || document.getElementById('main-logo').src; document.getElementById('status-bar').innerText=sett.msg;}
    const resI=await fetch(DB+"items.json"); const data=await resI.json();
    let offerHtml='', structure={};
    for(let id in data){
        let item=data[id];
        if(item.cat.includes("عرض")){offerHtml+=`<div class="special-offer">🎁 ${item.name} (${item.price}) <button onclick="u('${item.name}',${item.price},1,'off${id}')">+</button> <span id="off${id}">0</span></div>`}
        else {
            let parts = item.cat.split('-');
            let parent = parts[0].trim();
            let child = parts.length > 1 ? parts[1].trim() : "عام";
            if(!structure[parent]) structure[parent] = {};
            if(!structure[parent][child]) structure[parent][child] = [];
            structure[parent][child].push({...item, id});
        }
    }
    document.getElementById('offers-area').innerHTML=offerHtml;
    let menuHtml='', pi=0;
    for(let parent in structure){
        pi++;
        menuHtml += `<div class="parent-cat" onclick="toggle('p${pi}')">${parent} ▼</div><div id="p${pi}" style="display:none">`;
        let ci=0;
        for(let child in structure[parent]){
            ci++;
            menuHtml += `<div class="child-cat" style="display:block" onclick="toggle('p${pi}c${ci}')">${child} ⬇️</div><div id="p${pi}c${ci}" class="items-list">`;
            structure[parent][child].forEach((x, ii)=>{
                let qId = `q${pi}${ci}${ii}`;
                menuHtml += `<div class="item"><span>${x.name}<br><small>${x.price}</small></span><div class="ctrl"><button class="btn-q" onclick="u('${x.name}',${x.price},1,'${qId}')">+</button><span id="${qId}" style="margin:0 5px">0</span><button class="btn-q" onclick="u('${x.name}',${x.price},-1,'${qId}')">-</button></div></div>`;
            });
            menuHtml += `</div>`;
        }
        menuHtml += `</div>`;
    }
    document.getElementById('dynamic-menu').innerHTML=menuHtml;
}load();
</script></body></html>
