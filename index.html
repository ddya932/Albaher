<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الباهر - طلب أونلاين</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; background: white; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #e44d26; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #ddd; }
        .item span { font-weight: bold; }
        button { background: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        .order-btn { background: #25d366; width: 100%; padding: 15px; font-size: 18px; margin-top: 20px; font-weight: bold; }
        .input-group { margin-top: 15px; text-align: right; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        .cart { background: #fff3cd; padding: 10px; margin-top: 20px; border-radius: 10px; border: 1px dashed #856404; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔥 مطعم الباهر 🔥</h1>
    <p>اختر وجباتك المفضلة</p>

    <div id="menu">
        <div class="item">
            <span>كباب دجاج (15,000 د.ع)</span>
            <button onclick="addToCart('كباب دجاج', 15000)">إضافة +</button>
        </div>
        <div class="item">
            <span>نصف دجاجة شواية (7,000 د.ع)</span>
            <button onclick="addToCart('نصف دجاجة', 7000)">إضافة +</button>
        </div>
        <div class="item">
            <span>نفر كص لحم (12,000 د.ع)</span>
            <button onclick="addToCart('كص لحم', 12000)">إضافة +</button>
        </div>
    </div>

    <div class="cart">
        <strong>السلة:</strong>
        <ul id="cart-list" style="list-style: none; padding: 0;"></ul>
        <strong>الإجمالي: <span id="total-price">0</span> د.ع</strong>
    </div>

    <hr>

    <div class="input-group">
        <label>👤 اسم الزبون:</label>
        <input type="text" id="customer-name" placeholder="ادخل اسمك الكامل">
    </div>
    <div class="input-group">
        <label>📱 رقم الهاتف:</label>
        <input type="tel" id="customer-phone" placeholder="رقمك للتواصل">
    </div>
    <div class="input-group">
        <label>🏠 العنوان الكامل:</label>
        <textarea id="customer-address" rows="3" placeholder="المنطقة، الشارع، أقرب نقطة دالة"></textarea>
    </div>

    <button class="order-btn" onclick="sendOrder()">إرسال الطلب عبر الواتساب ✅</button>
</div>

<script>
    let cart = [];
    let totalPrice = 0;

    // معرفة المصدر (مثلاً hanan أو ali)
    const urlParams = new URLSearchParams(window.location.search);
    const referral = urlParams.get('ref') || 'زبون مباشر';

    function addToCart(name, price) {
        cart.push({name, price});
        totalPrice += price;
        updateUI();
    }

    function updateUI() {
        const list = document.getElementById('cart-list');
        list.innerHTML = "";
        cart.forEach(item => {
            const li = document.createElement('li');
            li.textContent = `• ${item.name} (${item.price.toLocaleString()} د.ع)`;
            list.appendChild(li);
        });
        document.getElementById('total-price').textContent = totalPrice.toLocaleString();
    }

    function sendOrder() {
        const name = document.getElementById('customer-name').value;
        const phone = document.getElementById('customer-phone').value;
        const address = document.getElementById('customer-address').value;

        if (cart.length === 0) { alert("السلة فارغة!"); return; }
        if (!name || !phone || !address) { alert("الرجاء ملء جميع المعلومات (الاسم، الهاتف، العنوان)!"); return; }

        let orderDetails = cart.map(item => `- ${item.name}`).join('%0A');
        
        // بناء الرسالة للواتساب
        let message = `*طلب جديد من مطعم الباهر*%0A`;
        message += `--------------------------%0A`;
        message += `👤 *الاسم:* ${name}%0A`;
        message += `📱 *الهاتف:* ${phone}%0A`;
        message += `🏠 *العنوان:* ${address}%0A`;
        message += `--------------------------%0A`;
        message += `🍴 *الطلبات:*%0A${orderDetails}%0A`;
        message += `--------------------------%0A`;
        message += `💰 *الإجمالي:* ${totalPrice.toLocaleString()} د.ع%0A`;
        message += `📢 *المصدر:* إعلان ${referral}`;

        // رقم واتساب المطعم (تأكد من كتابته بشكل صحيح بدون أصفار في البداية)
        window.open(`https://wa.me/9647823906644?text=${message}`, '_blank');
    }
</script>

</body>
</html>
