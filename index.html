<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title id="st">مطعم الباهر</title><style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:10px 10px 90px 10px;text-align:center}
.container{max-width:480px;background:#fff;margin:auto;padding:15px;border-radius:25px;box-shadow:0 5px 25px rgba(0,0,0,.1)}
#logo{width:110px;height:110px;border-radius:50%;border:4px solid #d32f2f;object-fit:cover;margin-bottom:10px;box-shadow:0 4px 10px rgba(0,0,0,0.2)}
.msg-box{background:#28a745;color:#fff;padding:12px;border-radius:15px;margin:10px 0;font-weight:bold;font-size:15px;animation:swing 2s ease-in-out}
@keyframes swing{0%,100%{transform:rotate(0)}25%{transform:rotate(1deg)}75%{transform:rotate(-1deg)}}
.parent-btn{background:#2c3e50;color:#fff;padding:15px;margin-top:12px;border-radius:12px;cursor:pointer;font-weight:bold;display:flex;justify-content:space-between;align-items:center}
.child-btn{background:#f8f9fa;color:#2c3e50;padding:12px;margin:6px 10px;border-radius:10px;cursor:pointer;font-weight:bold;text-align:right;border:1px solid #ddd;box-shadow:inset 0 1px 3px rgba(0,0,0,0.05)}
.items-list{display:none;padding:5px 15px}
.item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #eee}
.item img{width:65px;height:65px;border-radius:12px;margin-left:12px;object-fit:cover;border:1px solid #eee}
.btn-q{background:#e67e22;color:#fff;border:none;width:35px;height:35px;border-radius:8px;font-weight:bold;font-size:20px;cursor:pointer}
.fixed-nav{position:fixed;bottom:0;left:0;width:100%;background:#fff;display:flex;padding:12px;box-shadow:0 -4px 15px rgba(0,0,0,0.1);gap:10px;z-index:1000}
.nav-btn{flex:1;padding:14px;border-radius:12px;text-decoration:none;font-weight:bold;color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;border:none;cursor:pointer;font-size:15px}
.cart{background:#fff3cd;padding:15px;border-radius:15px;margin-top:20px;text-align:right;border:2px dashed #ffc107}
.btn-ord{background:#25d366;color:#fff;width:100%;padding:18px;font-size:20px;font-weight:bold;border:none;border-radius:15px;margin-top:20px;cursor:pointer;box-shadow:0 4px 10px rgba(37,211,102,0.3)}
input,textarea{width:100%;padding:14px;margin-top:10px;border-radius:12px;border:1px solid #ccc;box-sizing:border-box;font-size:16px}
</style></head><body><div class="container">
<img id="logo" src="https://cdn-icons-png.flaticon.com/512/3170/3170733.png">
<h1 id="title">مطعم الباهر</h1><div id="msg" class="msg-box">أهلاً بكم وحياكم الله</div>
<div id="menu-area">⏳ جاري تجهيز المنيو...</div>
<div class="cart"><strong>🛒 سلة الطلبات:</strong><div id="c-list"></div><hr>
<b>الإجمالي: <span id="tot">0</span> د.ع</b>
<div id="pts-msg" style="color:#e67e22;font-size:13px;margin-top:5px;font-weight:bold"></div></div>
<input type="text" id="un" placeholder="👤 اسمك الكريم"><input type="tel" id="up" placeholder="📱 رقم الهاتف"><textarea id="ua" placeholder="🏠 العنوان بالتفصيل"></textarea><button class="btn-ord" onclick="send()">إرسال الطلب للواتساب ✅</button></div>
<div class="fixed-nav">
    <a href="tel:07830834849" class="nav-btn" style="background:#007bff">📞 اتصل</a>
    <a id="nav-map" href="#" target="_blank" class="nav-btn" style="background:#dc3545">📍 الموقع</a>
    <button onclick="shareLink()" class="nav-btn" style="background:#6c757d">📤 مشاركة</button>
</div>
<script>
const DB="https://albaher-1ec78-default-rtdb.firebaseio.com/";
let c={},sub=0;
function toggle(id){let e=document.getElementById(id);e.style.display=(e.style.display==='block')?'none':'block'}
function u(n,p,ch,id){if(!c[n])c[n]={q:0,p:p};c[n].q+=ch;if(c[n].q<=0){delete c[n];document.getElementById(id).innerText="0"}else{document.getElementById(id).innerText=c[n].q}rc();}
function rc(){const d=document.getElementById('c-list');d.innerHTML="";sub=0;for(let n in c){sub+=(c[n].q*c[n].p);d.innerHTML+=`<div>${n} (x${c[n].q})</div>`}document.getElementById('tot').innerText=sub.toLocaleString();
let pts=Math.floor(sub/10000);document.getElementById('pts-msg').innerText=pts>0?`🌟 مبروك! ستحصل على ${pts} نقاط بهذا الطلب`:'';}
function send(){const n=document.getElementById('un').value,p=document.getElementById('up').value,a=document.getElementById('ua').value;if(!n||!p||!a||sub===0)return alert("لطفاً، املأ البيانات واختر الأكل!");let o="";for(let k in c){o+=`• ${k} (x${c[k].q})%0A`}let m=`*طلب جديد من مطعم الباهر*%0A👤 الاسم: ${n}%0A📱 الهاتف: ${p}%0A🏠 العنوان: ${a}%0A🍴 الطلبات:%0A${o}%0A💰 الحساب: ${sub.toLocaleString()} د.ع%0A🌟 نقاط الولاء: ${Math.floor(sub/10000)}`;window.open(`https://wa.me/9647830834849?text=${m}`,'_blank');}
function shareLink(){const u=window.location.href;if(navigator.share){navigator.share({title:'منيو مطعم الباهر',url:u}).catch(()=>{copyToClipboard(u)});}else{copyToClipboard(u);}}
function copyToClipboard(u){navigator.clipboard.writeText(u);alert("تم نسخ رابط المنيو! ارسله الآن لأصدقائك بالواتساب ✅");}
async function load(){
    const resS=await fetch(DB+"settings.json");const s=await resS.json();
    if(s){document.getElementById('title').innerText=s.name;document.getElementById('logo').src=s.logo||document.getElementById('logo').src;document.getElementById('msg').innerText=s.msg;if(s.map)document.getElementById('nav-map').href=s.map;}
    const resI=await fetch(DB+"items.json");const data=await resI.json();
    let struct={};for(let id in data){let it=data[id];if(!it.stock)continue;let parts=it.cat.split('-');let p=parts[0].trim(), ch=parts.length>1?parts[1].trim():'قائمة';if(!struct[p])struct[p]={};if(!struct[p][ch])struct[p][ch]=[];struct[p][ch].push({...it,id})}
    let h='',pi=0;for(let p in struct){pi++;h+=`<div class="parent-btn" onclick="toggle('p${pi}')">${p} <span>▼</span></div><div id="p${pi}" style="display:none">`;let ci=0;for(let ch in struct[p]){ci++;h+=`<div class="child-btn" onclick="toggle('p${pi}c${ci}')">${ch} ⬇️</div><div id="p${pi}c${ci}" class="items-list">`;struct[p][ch].forEach((x,ii)=>{let qId=`q${pi}${ci}${ii}`;h+=`<div class="item"><div style="display:flex;align-items:center">${x.img?`<img src="${x.img}">`:''}<span>${x.name}<br><small>${x.price.toLocaleString()} د.ع</small></span></div><div class="ctrl"><button class="btn-q" onclick="u('${x.name}',${x.price},1,'${qId}')">+</button><span id="${qId}" style="margin:0 10px;font-weight:bold">0</span><button class="btn-q" onclick="u('${x.name}',${x.price},-1,'${qId}')">-</button></div></div>`});h+=`</div>`}h+=`</div>`}document.getElementById('menu-area').innerHTML=h;
}load();
</script></body></html>
