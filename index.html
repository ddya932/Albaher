<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>منيو الباهر</title><style>body{font-family:Arial,sans-serif;background:#f0f2f5;margin:0;padding:10px;text-align:center}.container{max-width:480px;background:#fff;margin:auto;padding:15px;border-radius:20px;box-shadow:0 5px 20px rgba(0,0,0,.1)}.logo-img{width:110px;height:110px;border-radius:50%;border:3px solid #d32f2f;margin-bottom:5px;object-fit:cover}h1{color:#d32f2f;margin:5px 0}.status{padding:10px;border-radius:10px;margin-bottom:15px;font-weight:bold;color:#fff;font-size:14px}.open{background:#28a745}.closed{background:#d32f2f}.offer{background:linear-gradient(45deg,#ffd700,#ff8c00);color:#fff;padding:15px;border-radius:15px;margin-bottom:15px;font-weight:bold;font-size:15px}.sec-head{background:#2c3e50;color:#fff;padding:15px;margin-top:10px;border-radius:10px;cursor:pointer;display:flex;justify-content:space-between;font-weight:bold;font-size:18px}.list{display:none;padding:5px;border:1px solid #ddd;border-top:none;border-radius:0 0 10px 10px;margin-bottom:10px}.item{display:flex;justify-content:space-between;align-items:center;padding:15px 10px;border-bottom:1px solid #eee}.item:last-child{border-bottom:none}.ctrl{display:flex;align-items:center;gap:10px}.btn-q{background:#e67e22;color:#fff;border:none;width:35px;height:35px;border-radius:8px;font-weight:bold;font-size:20px;cursor:pointer}.q-num{font-weight:bold;font-size:18px;min-width:20px}.cart{background:#fff3cd;border:2px dashed #ffc107;border-radius:15px;padding:15px;margin-top:25px;text-align:right}.c-item{display:flex;justify-content:space-between;background:#fff;padding:10px;margin-bottom:8px;border-radius:8px}.btn-d{background:#ff4d4d;color:#fff;border:none;padding:5px 10px;border-radius:5px}input,textarea,select{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ccc;box-sizing:border-box;font-size:16px}.btn-ord{background:#25d3
