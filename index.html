<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>منيو مطعم الباهر - VIP</title>
<style>
body{font-family:'Arial',sans-serif;background:#f0f2f5;margin:0;padding:10px;text-align:center;}
.container{max-width:480px;background:#fff;margin:auto;padding:15px;border-radius:20px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
.logo-img{width:110px;height:110px;border-radius:50%;border:3px solid #d32f2f;margin-bottom:5px;object-fit:cover;}
h1{color:#d32f2f;margin-top:5px;margin-bottom:5px;}
.status{padding:10px;border-radius:10px;margin-bottom:15px;font-weight:bold;color:#fff;font-size:14px;}
.open{background:#28a745;} .closed{background:#d32f2f;}
.offer{background:linear-gradient(45deg,#ffd700,#ff8c00);color:#fff;padding:15px;border-radius:15px;margin-bottom:15px;font-weight:bold;animation:pulse 2s infinite;font-size:15px;}
@keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.02);}100%{transform:scale(1);}}
.sec-head{background:#2c3e50;color:#fff;padding:15px;margin-top:10px;border-radius:10px;cursor:pointer;display:flex;justify-content:space-between;font-weight:bold;font-size:18px;}
.list{display:none;padding:5px;border:1px solid #ddd;border-top:none;border-radius:0 0 10px 10px;margin-bottom:10px;}
.item{display:flex;justify-content:space-between;align-items:center;padding:15px 10px;border-bottom:1px solid #eee;}
.item:last-child{border-bottom:none;}
.ctrl{display:flex;align-items:center;gap:10px;}
.btn-q{background:#e67e22;color:#fff;border:none;width:35px;height:35px;border-radius:8px;font-weight:bold;font-size:20px;cursor:pointer;}
.q-num{font-weight:bold;font-size:18px;min-width:20px;}
.cart{background:#fff3cd;border:2px dashed #ffc107;border-radius:15px;padding:15px;margin-top:25px;text-align:right;}
.c-item{display:flex;justify-content:space-between;background:#fff;padding:10px;margin-bottom:8px;border-radius:8px;}
.btn-d{background:#ff4d4d;color:#fff;border:none;padding:5px 10px;border-radius:5px;}
input,textarea,select{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ccc;box-sizing:border-box;font-size:16px;font-family:inherit;}
.btn-ord{background:#25d366;color:#fff;width:100%;padding:18px;font-size:20px;font-weight:bold;border:none;border-radius:15px;margin-top:20px;cursor:pointer;box-shadow:0 4px 10px rgba(37,211,102,0.3);}
.hint{font-size:13px;color:#777;margin-top:5px;text-align:right;}
.pts-hint{font-size:14px;color:#e67e22;font-weight:bold;margin-top:10px;}
#loader{padding:20px;color:#888;font-weight:bold;font-size:18px;}
</style>
</head>
<body>
<div class="container">
<img src="https://cdn-icons-png.flaticon.com/512/3170/3170733.png" alt="لوكو المطعم" class="logo-img">
<h1>🔥 مطعم الباهر 🔥</h1>
<div id="status-bar"></div>
<div class="offer">🎁 عرض الباهر: اجمع 10 نقاط واحصل على وجبة مجانية!</div>

<div id="dynamic-menu">
    <div id="loader">⏳ جاري تحميل المنيو وأشهى الأكلات...</div>
</div>

<div class="cart">
    <strong>🛒 سلة طلباتك:</strong>
    <div id="c-disp" style="margin-top:10px;"></div><hr>
    <div style="font-size:16px;color:#555;">قيمة الطلب: <span id="sub-t">0</span> د.ع</div>
    <div style="font-size:16px;color:#555;margin-top:5px;">التوصيل: <span id="del-t">1,000</span> د.ع</div>
    <div style="font-size:20px;font-weight:bold;color:#d32f2f;margin-top:8px;">الإجمالي الكلي: <span id="tot">0</span> د.ع</div>
    <div class="pts-hint" id="pts-show">سيتم احتساب نقاطك بعد الإضافة!</div>
</div>

<input type="text" id="un" placeholder="👤 اسمك الكريم">
<input type="tel" id="up" placeholder="📱 رقم الهاتف">
<select id="del-area" onchange="calc()"><option value="1000">🛵 توصيل داخل النصر (1,000 د.ع)</option><option value="3000">🚗 توصيل القرى والأرياف (3,000 د.ع)</option></select>
<textarea id="ua" rows="2" placeholder="🏠 المنطقة، الشارع (أو اكتب: سأرسل الموقع)"></textarea>
<div class="hint">💡 إذا كنت لا تعرف العنوان بدقة، اكتب "سأرسل الموقع" وقم بمشاركته على الواتساب.</div>
<textarea id="unotes" rows="2" placeholder="📝 ملاحظات الطلب (مثلاً: بدون بصل، استواء كامل...)"></textarea>

<button class="btn-ord" onclick="send()">إرسال الطلب عبر واتساب ✅</button>
</div>

<script>
// أوقات العمل
let hr = new Date().getHours();
let sb = document.getElementById('status-bar');
if(hr >= 2 && hr < 6){
    sb.className = "status closed";
    sb.innerText = "🌙 المطعم مغلق الآن (يفتح 6 صباحاً). سنستلم طلبك ونجهزه عند الافتتاح.";
} else {
    sb.className = "status open";
    sb.innerText = "✅ المطعم مفتوح وجاهز لاستقبال طلباتكم";
}

let c={}; let sub=0; let pts=0;
const r=new URLSearchParams(window.location.search).get('ref')||'مباشر';

function t(id){let e=document.getElementById(id);e.style.display=(e.style.display==='block')?'none':'block';}
function u(n,p,ch,id){
    if(!c[n])c[n]={q:0,p:p,i:id};
    c[n].q+=ch;
    if(c[n].q<=0){delete c[n];document.getElementById(id).innerText="0";}
    else{document.getElementById(id).innerText=c[n].q;}
    rc();
}
function dItem(n){
    let id=c[n].i;delete c[n];
    if(document.getElementById(id))document.getElementById(id).innerText="0";
    rc();
}
function rc(){
    const d=document.getElementById('c-disp');d.innerHTML="";sub=0;
    for(let n in c){
        let s=c[n].q*c[n].p;sub+=s;
        d.innerHTML+=`<div class="c-item"><span>${n} (x${c[n].q})</span><span>${s.toLocaleString()} <button class="btn-d" onclick="dItem('${n}')">حذف</button></span></div>`;
    }
    calc();
}
function calc(){
    let del=parseInt(document.getElementById('del-area').value);
    document.getElementById('sub-t').innerText=sub.toLocaleString();
    document.getElementById('del-t').innerText=del.toLocaleString();
    let total=sub>0?sub+del:0;
    document.getElementById('tot').innerText=total.toLocaleString();
    pts = Math.floor(sub / 10000);
    document.getElementById('pts-show').innerText = sub > 0 ? `🌟 ستربح (${pts}) نقطة من هذا الطلب!` : "سيتم احتساب نقاطك بعد الإضافة!";
}
function send(){
    const n=document.getElementById('un').value,p=document.getElementById('up').value,a=document.getElementById('ua').value;
    const notes=document.getElementById('unotes').value||'لا توجد';
    const dSel=document.getElementById('del-area');
    const dTxt=dSel.options[dSel.selectedIndex].text;
    let v=document.getElementById('tot').innerText;
    if(!n||!p||!a||sub===0){alert("الرجاء ملء البيانات واختيار الوجبات!");return;}
    let o="";for(let k in c){o+=`• ${k} (العدد: ${c[k].q})%0A`;}
    let ptsMsg = pts > 0 ? `%0A🎁 مبروك! كسبت (${pts}) نقطة بهذا الطلب.` : '';
    let m=`*طلب جديد - مطعم الباهر*%0A👤 الاسم: ${n}%0A📱 الهاتف: ${p}%0A🏠 العنوان: ${a}%0A🚚 ${dTxt}%0A📝 ملاحظات: ${notes}%0A------------------%0A🍴 الطلبات:%0A${o}------------------%0A💰 الإجمالي الكلي: ${v} د.ع${ptsMsg}%0A📢 المصدر: ${r}`;
    window.open(`https://wa.me/9647830834849?text=${m}`,'_blank');
}

// السحر هنا: جلب البيانات من ملف الإكسل مالتك
const sheetUrl = 'https://docs.google.com/spreadsheets/d/1hiDCMhNrJZ8KdbxSQBANzgey_0gUf3SrGsW4HQIjAM0/export?format=csv';

fetch(sheetUrl)
.then(res => res.text())
.then(csvText => {
    let rows = csvText.split('\n');
    let menuData = {};
    
    // نبدأ من السطر الثاني (i=1) حتى
