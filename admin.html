<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>لوحة التحكم</title><style>
body{font-family:Arial;padding:15px;background:#f0f2f5;text-align:center}.box{max-width:450px;background:#fff;padding:20px;margin:auto;border-radius:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ccc;box-sizing:border-box}
.btn-add{background:#28a745;color:#fff;font-weight:bold;border:none;cursor:pointer}
.item-row{display:flex;justify-content:space-between;align-items:center;background:#eee;padding:10px;margin-top:10px;border-radius:8px}
.btn-del{background:#ff4d4d;color:#fff;border:none;padding:5px 10px;border-radius:5px}
</style></head><body><div class="box"><h2>🛠 إدارة الباهر</h2>
<input type="text" id="cat" placeholder="القسم (مثلاً: عروض، كباب، تمن)">
<input type="text" id="name" placeholder="اسم الأكلة">
<input type="number" id="price" placeholder="السعر">
<button class="btn-add" onclick="add()">➕ إضافة</button><hr>
<div id="list">⏳ تحميل...</div></div>
<script>
const URL = "https://albaher-1ec78-default-rtdb.firebaseio.com/items";
async function add(){
    const cat=document.getElementById('cat').value, name=document.getElementById('name').value, price=document.getElementById('price').value;
    if(!cat||!name||!price)return alert("املأ الحقول!");
    await fetch(URL+".json",{method:'POST',body:JSON.stringify({cat,name,price:parseInt(price)})});
    location.reload();
}
async function del(id){if(confirm("حذف؟")){await fetch(`${URL}/${id}.json`,{method:'DELETE'});location.reload()}}
async function load(){
    const res=await fetch(URL+".json");const data=await res.json();let h='';
    for(let id in data){h+=`<div class="item-row"><span><b>${data[id].cat}:</b> ${data[id].name}</span><button class="btn-del" onclick="del('${id}')">حذف</button></div>`}
    document.getElementById('list').innerHTML=h||'فارغ حالياً';
}load();
</script></body></html>
