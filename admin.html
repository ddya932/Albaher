<script>
// تحديث دالة الحفظ لتشمل العرض
async function saveSet(){
    const name=document.getElementById('r_name').value,
          offer=document.getElementById('r_offer').value,
          time=document.getElementById('r_time').value,
          msg=document.getElementById('r_msg').value;
    await fetch(DB+"settings.json",{method:'PUT',body:JSON.stringify({name,offer,time,msg})});
    alert("تم الحفظ ✅");
}
