<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>لوحة تحكم - مطعم الباهر</title><style>body{font-family:'Arial',sans-serif;background:#f4f7f6;padding:20px;direction:rtl}.box{max-width:500px;background:#fff;padding:25px;margin:auto;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1)}h2{color:#d32f2f;margin-bottom:20px}input,button,select{width:100%;padding:15px;margin-top:10px;border-radius:12px;border:1px solid #ddd;box-sizing:border-box;font-size:16px}.btn-add{background:#28a745;color:#fff;font-weight:bold;border:none;cursor:pointer;font-size:18px}.btn-add:hover{background:#218838}.item-card{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:15px;margin-top:10px;border-radius:12px;border-right:5px solid #d32f2f;box-shadow:0 2px 5px rgba(0,0,0,0.05)}.btn-del{background:#ff4d4d;color:#fff;border:none;padding:8px 15px;border-radius:8px;cursor:pointer;font-size:14px}hr{margin:25px 0;border:0;border-top:1px dashed #ccc}</style></head><body>

<div class="box">
    <h2>🛠 لوحة تحكم مطعم الباهر</h2>
    <p style="font-size: 14px; color: #666;">أضف صنفاً جديداً للمنيو مباشرة:</p>
    
    <input type="text" id="cat" placeholder="القسم (مثلاً: مشويات، مقبلات)">
    <input type="text" id="name" placeholder="اسم الأكلة (مثلاً: كباب عجل)">
    <input type="number" id="price" placeholder="السعر (أرقام فقط)">
    
    <button class="btn-add" onclick="add()">➕ إضافة إلى المنيو</button>
    
    <hr>
    <h3>📋 القائمة الحالية:</h3>
    <div id="list">جاري التحميل...</div>
</div>

<script>
// رابط السيرفر الخاص بك
const DB_URL = "https://albaher-1ec78-default-rtdb.firebaseio.com/items";

// وظيفة الإضافة
async function add(){
    const cat = document.getElementById('cat').value;
    const name = document.getElementById('name').value;
    const price = document.getElementById('price').value;

    if(!cat || !name || !price) {
        alert("يا مدير، املأ كل الحقول أولاً!");
        return;
    }

    const newItem = { cat, name, price: parseInt(price) };

    try {
        const response = await fetch(DB_URL + ".json", {
            method: 'POST',
            body: JSON.stringify(newItem)
        });
        if(response.ok) {
            alert("تمت الإضافة بنجاح! ✅");
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            load(); // تحديث القائمة
        }
    } catch(e) { alert("حدث خطأ! تأكد من الإنترنت."); }
}

// وظيفة الحذف
async function del(id){
    if(confirm("هل أنت متأكد من حذف هذه الأكلة؟")) {
        await fetch(`${DB_URL}/${id}.json`, { method: 'DELETE' });
        load();
    }
}

// وظيفة جلب البيانات وعرضها
async function load(){
    try {
        const res = await fetch(DB_URL + ".json");
        const data = await res.json();
        let html = '';
        if(data) {
            for(let id in data) {
                html += `
                <div class="item-card">
                    <div style="text-align:right">
                        <strong>${data[id].name}</strong><br>
                        <small style="color:#888">${data[id].cat} - ${data[id].price.toLocaleString()} د.ع</small>
                    </div>
                    <button class="btn-del" onclick="del('${id}')">حذف 🗑️</button>
                </div>`;
            }
        }
        document.getElementById('list').innerHTML = html || '<p>المنيو فارغ حالياً.</p>';
    } catch(e) { document.getElementById('list').innerHTML = '❌ خطأ في الاتصال بالسيرفر'; }
}

// تحميل البيانات عند فتح الصفحة
load();
</script>
</body></html>
