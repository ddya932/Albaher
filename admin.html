<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>إدارة الباهر</title><style>
body{font-family:Arial;padding:10px;background:#f0f2f5;text-align:center}.box{max-width:500px;background:#fff;padding:20px;margin:auto;border-radius:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
.tabs{display:flex;gap:5px;margin-bottom:15px} .tabs button{flex:1;padding:12px;cursor:pointer;border:none;border-radius:8px;background:#ddd;font-weight:bold} .tabs .active{background:#d32f2f;color:#fff}
.panel{display:none} .show{display:block}
input,textarea,button{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ccc;box-sizing:border-box}
.btn-save{background:#28a745;color:#fff;font-weight:bold;border:none;cursor:pointer}
.item-row{background:#f9f9f9;padding:15px;margin-top:10px;border-radius:12px;border-right:5px solid #d32f2f;text-align:right}
.stats{font-size:12px;color:#e67e22;font-weight:bold;display:block;margin-bottom:5px}
.actions{display:flex;gap:4px;margin-top:10px} .actions button{flex:1;padding:8px;border-radius:5px;border:none;color:#fff;cursor:pointer;font-size:12px}
</style></head><body><div class="box">
    <h2>👑 مركز قيادة الباهر</h2>
    <div class="tabs"><button id="t1" class="active" onclick="tab(1)">الأصناف</button><button id="t2" onclick="tab(2)">الإعدادات والألوان</button></div>
    <div id="p1" class="panel show">
        <input type="text" id="cat" placeholder="القسم (مشويات - كباب)">
        <input type="text" id="name" placeholder="اسم الأكلة">
        <input type="number" id="price" placeholder="السعر">
        <button class="btn-save" onclick="add()">➕ إضافة للمنيو</button><hr>
        <div id="list">جاري التحميل...</div>
    </div>
    <div id="p2" class="panel">
        <input type="text" id="r_name" placeholder="اسم المطعم">
        <input type="text" id="r_logo" placeholder="رابط اللوكو">
        <input type="text" id="r_map" placeholder="رابط خرائط جوجل">
        <textarea id="r_msg" rows="2" placeholder="رسالة الترحيب"></textarea>
        <div style="display:flex;gap:10px">
            <div style="flex:1">لون العناوين:<input type="color" id="p_col" value="#d32f2f"></div>
            <div style="flex:1">لون الأقسام:<input type="color" id="s_col" value="#2c3e50"></div>
        </div>
        <button class="btn-save" onclick="saveSet()">💾 حفظ الإعدادات</button>
    </div>
</div>
<script>
const DB="https://albaher-1ec78-default-rtdb.firebaseio.com/";
function tab(n){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));document.getElementById('p'+n).classList.add('show');document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));document.getElementById('t'+n).classList.add('active');}
async function add(){const cat=document.getElementById('cat').value,name=document.getElementById('name').value,price=document.getElementById('price').value;if(!cat||!name||!price)return alert("املأ الحقول!");await fetch(DB+"items.json",{method:'POST',body:JSON.stringify({cat,name,price:parseInt(price),stock:true,clicks:0})});location.reload();}
async function del(id){if(confirm("حذف؟")){await fetch(`${DB}items/${id}.json`,{method:'DELETE'});location.reload()}}
async function toggleS(id,cur){await fetch(`${DB}items/${id}/stock.json`,{method:'PUT',body:!cur});location.reload();}
async function saveSet(){const name=document.getElementById('r_name').value,logo=document.getElementById('r_logo').value,map=document.getElementById('r_map').value,msg=document.getElementById('r_msg').value,p_col=document.getElementById('p_col').value,s_col=document.getElementById('s_col').value;await fetch(DB+"settings.json",{method:'PUT',body:JSON.stringify({name,logo,map,msg,p_col,s_col})});alert("تم الحفظ ✅");}
async function load(){
    const resI=await fetch(DB+"items.json");const items=await resI.json();let h='';for(let id in items){let it=items[id];h+=`<div class="item-row"><span class="stats">🔥 شوهدت: ${it.clicks||0} مرة</span><b>${it.cat} > ${it.name}</b><div class="actions"><button style="background:#666" onclick="toggleS('${id}',${it.stock})">${it.stock?'متوفر':'خلص'}</button><button style="background:#ff4d4d" onclick="del('${id}')">حذف</button></div></div>`}document.getElementById('list').innerHTML=h||'لا يوجد';
    const resS=await fetch(DB+"settings.json");const s=await resS.json();if(s){document.getElementById('r_name').value=s.name||'';document.getElementById('r_logo').value=s.logo||'';document.getElementById('r_map').value=s.map||'';document.getElementById('r_msg').value=s.msg||'';document.getElementById('p_col').value=s.p_col||'#d32f2f';document.getElementById('s_col').value=s.s_col||'#2c3e50';}
}load();
</script></body></html>
