<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>إدارة الباهر - روابط المعلنين</title><style>
body{font-family:Arial;padding:15px;background:#f0f2f5;text-align:center}.box{max-width:500px;background:#fff;padding:25px;border-radius:25px;box-shadow:0 10px 30px rgba(0,0,0,0.1)}
.tabs{display:flex;gap:5px;margin-bottom:20px} .tabs button{flex:1;padding:12px;cursor:pointer;border:none;border-radius:12px;background:#ddd;font-weight:bold;font-size:13px} .tabs .active{background:#d32f2f;color:#fff}
.panel{display:none} .show{display:block}
input,textarea,button{width:100%;padding:14px;margin-top:12px;border-radius:12px;border:1px solid #ccc;box-sizing:border-box;font-size:15px}
.btn-save{background:#28a745;color:#fff;font-weight:bold;cursor:pointer}
.item-row{background:#f9f9f9;padding:15px;margin-top:12px;border-radius:15px;border-right:6px solid #d32f2f;text-align:right}
.link-box{background:#e7f3ff;padding:15px;border-radius:15px;margin-top:15px;border:1px dashed #007bff; word-break: break-all; font-size: 13px;}
</style></head><body><div class="box">
    <h2 style="color:#d32f2f">مركز قيادة الباهر</h2>
    <div class="tabs">
        <button id="t1" class="active" onclick="tab(1)">🍔 الأصناف</button>
        <button id="t2" onclick="tab(2)">⚙️ الإعدادات</button>
        <button id="t3" onclick="tab(3)">📢 المعلنين</button>
    </div>

    <div id="p1" class="panel show">
        <input type="text" id="cat" placeholder="القسم (مشويات - كباب)"><input type="text" id="name" placeholder="اسم الأكلة"><input type="number" id="price" placeholder="السعر"><button class="btn-save" onclick="add()">➕ إضافة</button><hr><div id="list">⏳ جاري التحميل...</div>
    </div>

    <div id="p2" class="panel">
        <input type="text" id="r_name" placeholder="اسم المطعم"><input type="text" id="r_time" placeholder="وقت التجهيز"><textarea id="r_msg" rows="3" placeholder="رسالة الترحيب"></textarea><button class="btn-save" onclick="saveSet()">💾 حفظ</button>
    </div>

    <div id="p3" class="panel">
        <h3>🔗 مولد روابط الإعلانات</h3>
        <p style="font-size: 12px; color: #666;">اكتب اسم المعلن (بالإنجليزي أفضل) وسوف أصنع لك رابطاً خاصاً به.</p>
        <input type="text" id="adv_name" placeholder="اسم المعلن (مثلاً: nasriya_page)">
        <button class="btn-save" style="background:#007bff" onclick="genLink()">✨ توليد الرابط ونسخه</button>
        <div id="result-link" class="link-box" style="display:none">
            <b>الرابط الخاص بالمعلن:</b><br>
            <span id="final-url"></span>
        </div>
    </div>
</div>

<script>
const DB="https://albaher-1ec78-default-rtdb.firebaseio.com/";
const MY_URL = "https://ddya932.github.io/Albaher/"; // رابط موقعك

function tab(n){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));document.getElementById('p'+n).classList.add('show');document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));document.getElementById('t'+n).classList.add('active');}

function genLink(){
    const name = document.getElementById('adv_name').value.trim();
    if(!name) return alert("اكتب اسم المعلن أولاً!");
    const final = MY_URL + "?ref=" + encodeURIComponent(name);
    document.getElementById('final-url').innerText = final;
    document.getElementById('result-link').style.display = 'block';
    
    // نسخ الرابط تلقائياً
    navigator.clipboard.writeText(final);
    alert("تم توليد الرابط ونسخه بنجاح! تكدر تدزه للمعلن الآن.");
}

async function add(){const cat=document.getElementById('cat').value,name=document.getElementById('name').value,price=document.getElementById('price').value;if(!cat||!name||!price)return alert("املأ الحقول!");await fetch(DB+"items.json",{method:'POST',body:JSON.stringify({cat,name,price:parseInt(price),stock:true,clicks:0})});location.reload();}
async function del(id){if(confirm("حذف؟")){await fetch(`${DB}items/${id}.json`,{method:'DELETE'});location.reload()}}
async function saveSet(){const name=document.getElementById('r_name').value,msg=document.getElementById('r_msg').value,time=document.getElementById('r_time').value;await fetch(DB+"settings.json",{method:'PUT',body:JSON.stringify({name,msg,time})});alert("تم الحفظ ✅");}
async function load(){
    const resI=await fetch(DB+"items.json");const items=await resI.json();let h='';for(let id in items){let it=items[id];h+=`<div class="item-row"><b>${it.cat} > ${it.name}</b> <button style="background:#ff4d4d; color:white; border:none; padding:5px; border-radius:5px;" onclick="del('${id}')">حذف</button></div>`}document.getElementById('list').innerHTML=h||'فارغ';
    const resS=await fetch(DB+"settings.json");const s=await resS.json();if(s){document.getElementById('r_name').value=s.name||'';document.getElementById('r_msg').value=s.msg||'';document.getElementById('r_time').value=s.time||'';}
}load();
</script></body></html>
