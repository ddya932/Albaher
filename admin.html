<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>إدارة مطعم الباهر - الإصدار النهائي</title><style>
body{font-family:Arial;padding:10px;background:#f0f2f5;text-align:center}.box{max-width:500px;background:#fff;padding:20px;margin:auto;border-radius:20px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
.tabs{display:flex;gap:5px;margin-bottom:15px} .tabs button{flex:1;padding:12px;cursor:pointer;border:none;border-radius:10px;background:#ddd;font-weight:bold;transition:0.3s} .tabs .active{background:#d32f2f;color:#fff}
.panel{display:none} .show{display:block}
input,textarea,button,select{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ccc;box-sizing:border-box;font-size:15px}
.btn-save{background:#28a745;color:#fff;font-weight:bold;border:none;cursor:pointer}
.item-row{background:#f9f9f9;padding:15px;margin-top:10px;border-radius:12px;border-right:5px solid #d32f2f;text-align:right;position:relative}
.stats-label{font-size:11px;color:#e67e22;font-weight:bold;display:block;margin-bottom:5px}
.actions{display:flex;gap:5px;margin-top:10px} .actions button{flex:1;padding:8px;border-radius:8px;border:none;color:#fff;cursor:pointer;font-size:13px}
.btn-del{background:#ff4d4d} .btn-off{background:#6c757d} .btn-edit{background:#007bff}
</style></head><body><div class="box">
    <h2>👑 مركز قيادة الباهر</h2>
    <div class="tabs"><button id="t1" class="active" onclick="tab(1)">🍽 الأصناف</button><button id="t2" onclick="tab(2)">⚙️ الإعدادات</button></div>
    
    <div id="p1" class="panel show">
        <p style="font-size:12px;color:#666">مهم: استخدم ( - ) للفصل، مثل: مشويات - كباب</p>
        <input type="text" id="cat" placeholder="القسم (مثلاً: مشويات - كباب)">
        <input type="text" id="name" placeholder="اسم الأكلة">
        <input type="number" id="price" placeholder="السعر">
        <input type="text" id="img" placeholder="رابط صورة الأكلة (اختياري)">
        <button class="btn-save" onclick="add()">➕ إضافة للمنيو</button><hr>
        <div id="list">⏳ جاري تحميل قائمة الطعام...</div>
    </div>

    <div id="p2" class="panel">
        <input type="text" id="r_name" placeholder="اسم المطعم">
        <input type="text" id="r_logo" placeholder="رابط صورة اللوكو">
        <input type="text" id="r_map" placeholder="رابط قوقل ماب">
        <input type="text" id="r_time" placeholder="وقت التجهيز (مثلاً: 20-30 دقيقة)">
