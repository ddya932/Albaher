<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة قيادة الباهر</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #d32f2f; --dark: #333; --light: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); padding: 15px; margin: 0; padding-bottom: 50px;}
        .header { text-align: center; color: var(--primary); margin-bottom: 20px; font-size: 24px; font-weight: bold; border-bottom: 2px solid var(--primary); padding-bottom: 10px;}
        .box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);}
        h2 { color: var(--dark); margin-top: 0; font-size: 18px; display: flex; align-items: center; gap: 8px;}
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 14px;}
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 14px;}
        input:focus, select:focus { border-color: var(--primary); outline: none;}
        button { background: var(--primary); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s;}
        button:active { background: #b71c1c; transform: scale(0.98);}
        .btn-green { background: #25D366; }
        .link-box { background: #e8f5e9; padding: 10px; border-radius: 5px; text-align: left; direction: ltr; word-break: break-all; font-size: 12px; display: none; color: #333; font-weight: bold;}
    </style>
</head>
<body>

    <div class="header">👑 مركز إدارة الباهر</div>

    <div class="box">
        <h2>⚙️ إعدادات المطعم العامة</h2>
        
        <label>رقم الواتساب (لاستلام الطلبات):</label>
        <input type="text" id="set-phone" placeholder="مثال: 07830834849">
        
        <label>حالة المطعم (يستقبل طلبات؟):</label>
        <select id="set-status">
            <option value="open">✅ مفتوح - يستقبل الطلبات</option>
            <option value="closed">🚫 مغلق - لا يستقبل طلبات (تعزيل)</option>
        </select>

        <label>أجرة التوصيل الثابتة (بالدينار):</label>
        <input type="number" id="set-fee" placeholder="مثال: 2000">

        <label>الحد الأدنى للطلب (بالدينار):</label>
        <input type="number" id="set-min" placeholder="مثال: 5000">

        <label>وقت التوصيل المتوقع (يظهر للزبون):</label>
        <input type="text" id="set-time" placeholder="مثال: 30 - 45 دقيقة">

        <button onclick="saveSettings()">💾 حفظ ونشر الإعدادات فوراً</button>
    </div>

    <div class="box">
        <h2>🍔 إضافة أكلة جديدة للمنيو</h2>
        
        <label>القسم (يجمع الأكلات المتشابهة):</label>
        <input type="text" id="item-cat" placeholder="مثال: مشويات، قسم الغربي، مقبلات...">
        
        <label>اسم الأكلة:</label>
        <input type="text" id="item-name" placeholder="مثال: نفر كباب عراقي">
        
        <label>السعر (بالدينار):</label>
        <input type="number" id="item-price" placeholder="مثال: 7000">
        
        <label>رابط الصورة (اختياري، يفضل من صور الـ AI):</label>
        <input type="text" id="item-img" placeholder="انسخ رابط الصورة هنا">
        
        <button onclick="addItem()">➕ إضافة للمنيو</button>
    </div>

    <div class="box">
        <h2>📢 نظام المعلنين (روابط التتبع)</h2>
        <label>اسم البيج أو المعلن:</label>
        <input type="text" id="marketer-name" placeholder="مثال: بيج النصر">
        <button class="btn-green" onclick="generateLink()">🔗 توليد رابط التتبع للمعلن</button>
        <div id="marketer-link" class="link-box" style="margin-top:10px;"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://albaher-1ec78-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // جلب وعرض الإعدادات الحالية حتى تقدر تعدلها
        db.ref('settings').on('value', (snapshot) => {
            if(snapshot.exists()) {
                let s = snapshot.val();
                document.getElementById('set-phone').value = s.phone || "";
                document.getElementById('set-status').value = s.status || "open";
                document.getElementById('set-fee').value = s.fee || "0";
                document.getElementById('set-min').value = s.minOrder || "0";
                document.getElementById('set-time').value = s.time || "";
            }
        });

        // حفظ الإعدادات
        function saveSettings() {
            let phone = document.getElementById('set-phone').value;
            if(!phone) { alert("يجب كتابة رقم الواتساب الخاص بك!"); return; }

            db.ref('settings').set({
                phone: phone,
                status: document.getElementById('set-status').value,
                fee: document.getElementById('set-fee').value,
                minOrder: document.getElementById('set-min').value,
                time: document.getElementById('set-time').value
            }).then(() => {
                alert("✅ تم حفظ الإعدادات! التطبيق تحدث عند كل الزبائن.");
            }).catch(err => alert("حدث خطأ: " + err));
        }

        // إضافة أكلة جديدة
        function addItem() {
            let cat = document.getElementById('item-cat').value || "القائمة الرئيسية";
            let name = document.getElementById('item-name').value;
            let price = document.getElementById('item-price').value;
            let img = document.getElementById('item-img').value;
            
            if(!name || !price) {
                alert("⚠️ الرجاء كتابة اسم وسعر الأكلة على الأقل!");
                return;
            }

            db.ref('menu').push({ category: cat, name: name, price: price, img: img }).then(() => {
                alert("✅ تم إضافة الأكلة للمنيو بنجاح!");
                // تفريغ الحقول ما عدا القسم حتى يسهل الإضافة المتتالية
                document.getElementById('item-name').value = '';
                document.getElementById('item-price').value = '';
                document.getElementById('item-img').value = '';
            }).catch(err => alert("حدث خطأ: " + err));
        }

        // توليد رابط المعلن
        function generateLink() {
            let name = document.getElementById('marketer-name').value.trim().replace(/\s+/g, '_');
            if(!name) return alert("اكتب اسم المعلن أولاً");
            let link = `https://ddya932.github.io/Albaher/?ref=${name}`;
            let box = document.getElementById('marketer-link');
            box.innerText = link;
            box.style.display = 'block';
        }
    </script>
</body>
</html>
